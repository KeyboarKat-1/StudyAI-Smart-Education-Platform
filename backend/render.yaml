services:
  - type: web
    name: studyai-backend
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn --bind 0.0.0.0:$PORT 'backend.app:app' --workers 2 --timeout 120"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: FIREBASE_CREDENTIALS_PATH
        sync: false
      - key: FRONTEND_URL
        sync: false
    healthCheckPath: /api/health
    plan: free
